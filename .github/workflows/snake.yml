name: snake

on:
workflow_dispatch:

permissions:
contents: write

jobs:
 snake:
  runs-on: ubuntu-latest
  steps:
     - uses: actions/checkout@v3

     - uses: Platane/snk@v3
      with:
       github_user_name: Akshanth07
       outputs: dist/snake.svg

     - uses: peaceiris/actions-gh-pages@v3
      with:
       github_token: ${{ secrets.GITHUB_TOKEN }}
       publish_dir: dist
       publish_branch: output
