name: Generate Snake

on:
workflow_dispatch:

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Generate snake
    uses: Platane/snk@v3
    with:
      github_user_name: Akshanth07
      outputs: dist/github-contribution-grid-snake.svg

  - name: Push to branch
    uses: peaceiris/actions-gh-pages@v3
    with:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      publish_dir: dist
      publish_branch: output
```
